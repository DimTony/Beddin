name: Project board automation

on:
  issues:
    types: [opened, closed, reopened]
  pull_request:
    types: [opened, closed, converted_to_draft, ready_for_review]

jobs:
  automate-board:
    name: Move cards on project board
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Move issue to Backlog when opened
        if: github.event_name == 'issues' && github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const query = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $number) {
                    id
                    projectItems(first: 10) {
                      nodes { id project { id } }
                    }
                  }
                }
              }`;
            const result = await github.graphql(query, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: context.issue.number,
            });
            console.log('Issue opened — board automation handled by GitHub Projects built-in workflow.');
            console.log('Ensure "Item added to project ? set Status = Backlog" is enabled in Projects settings.');

      - name: Move linked issues to In review when PR opens
        if: >
          github.event_name == 'pull_request' &&
          github.event.action == 'ready_for_review' ||
          (github.event_name == 'pull_request' && github.event.action == 'opened' && !github.event.pull_request.draft)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            // Extract issue numbers from "Closes #N", "Fixes #N", "Resolves #N"
            const pattern = /(?:closes?|fixes?|resolves?)\s+#(\d+)/gi;
            const matches = [...body.matchAll(pattern)];
            const issueNumbers = matches.map(m => parseInt(m[1]));

            if (issueNumbers.length === 0) {
              console.log('No linked issues found in PR body. Add "Closes #N" to auto-move cards.');
              return;
            }

            console.log(`Linked issues: ${issueNumbers.join(', ')}`);
            console.log('Move these to "In review" via GitHub Projects built-in PR workflow,');
            console.log('or upgrade to a GitHub Projects GraphQL mutation with a PROJECT_TOKEN.');

      - name: Move linked issues to Done when PR merges
        if: >
          github.event_name == 'pull_request' &&
          github.event.action == 'closed' &&
          github.event.pull_request.merged == true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            const pattern = /(?:closes?|fixes?|resolves?)\s+#(\d+)/gi;
            const matches = [...body.matchAll(pattern)];
            const issueNumbers = matches.map(m => parseInt(m[1]));

            for (const number of issueNumbers) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                body: `Closed by #${pr.number} — merged into \`${pr.base.ref}\` by @${pr.merged_by.login}.`,
              });
              console.log(`Commented on issue #${number}`);
            }