name: Stale issue management

on:
  schedule:
    - cron: 0 9 * * 1  # Every Monday at 09:00 UTC
  workflow_dispatch:     # Allow manual trigger

jobs:
  stale:
    name: Mark and close stale issues
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Handle stale issues and PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: stale
          stale-issue-message: >
            This issue has had no activity for 30 days.
            It will be closed in 7 days unless there is new activity.
            If this is still relevant, please leave a comment or remove the `stale` label.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if this becomes relevant again.

          # PRs
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: stale
          stale-pr-message: >
            This PR has had no activity for 14 days and will be closed in 7 days.
            If it's still in progress, please push a commit or leave a comment.
          close-pr-message: >
            Closing due to inactivity. The branch is preserved — reopen whenever you're ready.

          # Never mark these as stale
          exempt-issue-labels: blocked,pinned
          exempt-pr-labels: blocked
          exempt-all-milestones: false