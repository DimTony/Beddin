name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint À Typecheck À Test (Frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: src/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: src/web

      - name: Lint
        run: pnpm lint
        working-directory: src/web

      - name: Typecheck
        run: pnpm typecheck
        working-directory: src/web

      - name: Run tests
        run: pnpm test
        working-directory: src/web

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  api-test:
    name: .NET Build & Test (API)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: beddin_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Admin123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore dependencies
        run: dotnet restore
        working-directory: src/api

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: src/api

      # - name: Run Unit Tests
      #   run: dotnet test tests/Beddin.UnitTests/Beddin.UnitTests.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=unit-test-results.trx"
      #   working-directory: src/api

      # - name: Run Architecture Tests
      #   run: dotnet test tests/Beddin.ArchitectureTests/Beddin.ArchitectureTests.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=arch-test-results.trx"
      #   working-directory: src/api

      # - name: Run Integration Tests
      #   run: dotnet test tests/Beddin.IntegrationTests/Beddin.IntegrationTests.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=integration-test-results.trx"
      #   working-directory: src/api
      #   env:
      #     ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=beddin_test;Username=postgres;Password=Admin123"
      #     ConnectionStrings__Redis: "localhost:6379"

      # - name: Upload test results
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: test-results
      #     path: src/api/tests/**/TestResults/*.trx

  docker-build:
    name: Docker Build (API)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: api-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: beddin-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build Check (Frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: src/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: src/web

      - name: Build
        run: pnpm build
        working-directory: src/web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: http://localhost:3000   